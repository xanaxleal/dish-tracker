<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Dieta</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Georgia', serif; background: #faf9f7; min-height: 100vh; color: #2a2a2a; }

  /* Layout */
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  #header { padding: 52px 24px 0; }
  #header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  #header-status { font-family: system-ui; font-size: 12px; margin-bottom: 16px; }
  #content { flex: 1; padding: 0 24px 40px; display: flex; flex-direction: column; }

  /* Views */
  .view { display: none; flex-direction: column; flex: 1; gap: 14px; }
  .view.active { display: flex; }

  /* Typography */
  .label { font-family: system-ui; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
  .week-label { font-family: system-ui; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 2px; }
  .meal-title { font-size: 24px; font-weight: 400; color: #2a2a2a; line-height: 1.1; }

  /* Buttons */
  .btn { width: 100%; border: none; border-radius: 16px; padding: 16px; font-size: 15px; font-family: 'Georgia', serif; cursor: pointer; text-align: center; }
  .btn-dark { background: #2a2a2a; color: #faf9f7; }
  .btn-light { background: #fff; color: #2a2a2a; border: 1px solid #e0ddd8 !important; }
  .btn-warning { background: #a07020; color: #fff; }
  .week-btn { background: #eee; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #666; cursor: pointer; font-family: system-ui; white-space: nowrap; }
  .back-btn { background: none; border: none; color: #aaa; font-size: 14px; font-family: system-ui; cursor: pointer; padding: 8px 0; margin-top: 4px; text-align: left; }

  /* Cards */
  .suggested-card { border-radius: 20px; padding: 18px 20px; }
  .hint { font-family: system-ui; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #bbb; margin-bottom: -6px; }

  /* Pills */
  .pills { display: flex; gap: 8px; }
  .pill { flex: 1; border: none; border-radius: 14px; padding: 12px 8px; text-align: center; cursor: pointer; }
  .pill-num { font-size: 22px; font-weight: 400; }
  .pill-lbl { font-family: system-ui; font-size: 10px; margin-top: 3px; font-style: italic; }

  /* Log */
  .dish-btn { width: 100%; border-radius: 16px; padding: 16px 18px; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; border: none; }
  .dish-name { font-size: 15px; font-family: 'Georgia', serif; }
  .dish-comp { font-family: system-ui; font-size: 12px; color: #aaa; margin-top: 2px; }
  .dish-rem { font-size: 18px; text-align: right; }
  .dish-rem-lbl { font-family: system-ui; font-size: 10px; color: #bbb; }

  /* Warning */
  .warning-card { background: #fff8ee; border: 1px solid #f0c060; border-radius: 16px; padding: 18px; }
  .warning-title { font-size: 15px; color: #a07020; margin-bottom: 6px; }
  .warning-text { font-family: system-ui; font-size: 13px; color: #888; line-height: 1.5; }

  /* Success */
  .success-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }

  /* Recipes */
  .recipe-dish-card { border-radius: 16px; padding: 14px 16px; }
  .recipe-btn { width: 100%; border-radius: 14px; padding: 14px 16px; cursor: pointer; text-align: left; font-family: 'Georgia', serif; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border: none; }
  .recipe-body { border-radius: 0 0 14px 14px; padding: 14px 16px; font-family: system-ui; font-size: 13px; color: #555; line-height: 1.7; white-space: pre-line; }
  .recipe-wrap { margin-bottom: 10px; }

  /* Weekly */
  .week-section { background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #eee; }
  .week-row { margin-bottom: 10px; }
  .week-row-hdr { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
  .week-bar-bg { background: #f0ede8; border-radius: 4px; height: 6px; }
  .week-bar { height: 6px; border-radius: 4px; }

  /* Fuera */
  .fuera-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; }
  .fuera-emoji { font-size: 48px; }
  .fuera-title { font-size: 20px; }
  .fuera-text { font-family: system-ui; font-size: 14px; color: #888; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <!-- Persistent header -->
  <div id="header">
    <div id="header-top">
      <div>
        <div class="week-label" id="hdr-semana">Semana 1</div>
        <div class="meal-title" id="hdr-meal">☀️ Comida</div>
      </div>
      <button class="week-btn" id="btn-weekly">Vista semanal</button>
    </div>
    <div id="header-status" style="color:#4a7c59;">● Comida activa</div>
  </div>

  <!-- Content area -->
  <div id="content">

    <!-- VIEW: Home -->
    <div id="view-home" class="view">
      <div class="suggested-card" id="suggested-card">
        <div class="label" id="sug-label" style="margin-bottom:6px;"></div>
        <div style="font-size:19px;color:#2a2a2a;margin-bottom:4px;" id="sug-name"></div>
        <div style="font-family:system-ui;font-size:13px;color:#888;" id="sug-comp"></div>
        <div style="margin-top:10px;">
          <span id="sug-badge" style="font-size:11px;padding:4px 10px;border-radius:20px;font-family:system-ui;"></span>
        </div>
      </div>
      <div class="hint">Platos restantes esta semana</div>
      <div class="pills" id="pills"></div>
      <button class="btn btn-dark" id="btn-log">¿Qué has comido?</button>
    </div>

    <!-- VIEW: Log -->
    <div id="view-log" class="view">
      <div id="log-main">
        <div class="label" style="margin-bottom:12px;" id="log-subtitle">¿Qué has comido?</div>
        <div id="log-dishes"></div>
        <button class="back-btn" id="btn-log-cancel">Cancelar</button>
      </div>
      <div id="log-warn" style="display:none;flex-direction:column;gap:14px;">
        <div class="warning-card">
          <div class="warning-title">Límite semanal alcanzado</div>
          <div class="warning-text" id="warn-text"></div>
        </div>
        <button class="btn btn-warning" id="btn-override">Registrar igualmente</button>
        <button class="btn btn-light" id="btn-warn-cancel">Cancelar</button>
      </div>
      <div id="log-ok" style="display:none;">
        <div class="success-wrap">
          <div style="font-size:56px;">✓</div>
          <div style="font-size:18px;color:#4a7c59;">Registrado correctamente</div>
        </div>
      </div>
    </div>

    <!-- VIEW: Recipes -->
    <div id="view-recipes" class="view">
      <div class="recipe-dish-card" id="recipe-card"></div>
      <div class="label">Recetas para este plato</div>
      <div id="recipes-list"></div>
      <button class="back-btn" id="btn-recipe-back">← Volver</button>
    </div>

    <!-- VIEW: Weekly -->
    <div id="view-weekly" class="view">
      <div class="label" style="margin-bottom:4px;">Progreso semanal</div>
      <div id="weekly-content"></div>
      <button class="back-btn" id="btn-weekly-back">← Volver</button>
    </div>

    <!-- VIEW: Fuera -->
    <div id="view-fuera" class="view">
      <div class="fuera-wrap">
        <div class="fuera-emoji">🕐</div>
        <div class="fuera-title">Ahora no toca</div>
        <div class="fuera-text">La comida está activa de <strong>13:00 a 16:00</strong><br>y la cena de <strong>20:30 a 23:00</strong>.</div>
        <div id="fuera-hora" style="font-family:system-ui;font-size:12px;color:#ccc;margin-top:4px;"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Data ───────────────────────────────────────────────────────────────────
const DISHES = {
  1: { name:"Plato 1", comp:"50% veg · 50% proteína",                       color:"#4a7c59", bg:"#eef4f0" },
  2: { name:"Plato 2", comp:"50% veg · 25% proteína · 25% carbs",           color:"#7c6b4a", bg:"#f4f1ee" },
  3: { name:"Plato 3", comp:"50% veg · 35% legumbres · 15% proteína animal",color:"#4a617c", bg:"#eef1f4" },
};
const LIMITS = { lunch:{1:3,2:2,3:2}, dinner:{1:4,2:2,3:1} };
const RECIPES = {
  1:{
    lunch:[
      {title:"Bowl de Pollo Souvlaki", instructions:"Marinado Greek Lemon: Mezcla jugo de limón, aceite de oliva virgen extra, vinagre de vino tinto, ajos picados, orégano seco, una pizca de cúrcuma, sal y pimienta.\nCocción: Marina trozos de pechuga de pollo al menos 30 min y cocínalos en sartén, grill o freidora de aire hasta que estén dorados.\n\nEnsalada Griega: Pepinos en cubos, tomates maduros, cebolla roja y eneldo fresco. Aliño de jugo de limón, sal y pimienta.\n\nSalsa Tzatziki: Yogur griego con pepino rallado (bien escurrido), ajo picado, limón, sal y pimienta."},
      {title:"Brochetas de ternera con lima negra", instructions:"Marinado: Corta solomillo en cubos de 2 cm. Mezcla con lima negra molida, ralladura y jugo de limón, comino, ajo, aceite de oliva, sal y pimienta. Marina 1 hora mínimo.\n\nCebollas al sumac: Cebolla roja con sumac, vinagre de sidra y sal. Reposa 30 min.\n\nCocción: Ensarta en brochetas y cocina en plancha muy caliente 3–4 min por tanda.\n\nServicio: Acompaña de cebollas al sumac, perejil y menta frescos."},
    ],
    dinner:[
      {title:"Salmón al Za'atar con Ensalada de Hinojo y Calabacín", instructions:"Precalienta el horno a 230°C. Seca el salmón y cúbrelo con za'atar y sumac.\nEn sartén apta para horno, marchita espinacas con aceite, coloca el salmón (piel abajo) y hornea 5 min.\nVierte mezcla de tahini, ajo, limón y agua alrededor (sin mojar la costra) y hornea 5 min más.\n\nEnsalada: Hinojo y calabacín en láminas finas. Aliño de limón encurtido, chalota, ajo y aceite. Mezcla con hierbas frescas."},
      {title:'Atún "Blackened" con Salsa de Jícama y Tomate', instructions:"Salsa: Mezcla jícama picada, tomates cherry y jalapeños encurtidos con jugo de lima, cilantro y miel.\n\nSazonar: Cubre atún fresco con chile en polvo, comino, cilantro molido, orégano, ajo y cebolla en polvo.\n\nCocinar: Sella en sartén con aceite de aguacate a fuego alto — costra bien oscura, centro al punto.\n\nMontaje: Corta en tiras sobre hojas de lechuga mantequilla y cubre con la salsa."},
    ],
  },
  2:{
    lunch:[
      {title:"Banh Mi Turkey Meatball Rice Bowls", instructions:"Encurtidos: Zanahoria rallada y rábanos con vinagre blanco, azúcar y sal. Reserva en nevera.\n\nAlbóndigas: Pavo picado, ajo, jengibre, soja, panko, huevo y cebollino. Forma bolitas y hornea a 200°C 18 min.\n\nSalsa: Hierve soja, vinagre de arroz, hoisin, azúcar morena, aceite de sésamo, jengibre y ajo. Añade las albóndigas.\n\nMontaje: Base de arroz integral (25%), albóndigas (25%) y el resto (50%) con encurtido, repollo morado, pepino, jalapeño y cilantro."},
      {title:"Lasaña vegetal", instructions:"Asar vegetales: Pimientos, calabacín, champiñones, hinojo, cebolla roja con vinagre balsámico y especias a 230°C 30–35 min.\n\nRelleno: Ricotta descremada con Pecorino y albahaca fresca.\n\nMontaje: Capa de salsa marinara, láminas de pasta, vegetales, ricotta y mozzarella. Repite 3 veces.\n\nCocción: Cubre con papel aluminio a 200°C 45 min. Destapa 10 min más. Reposa 15 min."},
    ],
    dinner:[
      {title:"Tortitas de gambas thai con ensalada de pepino y arroz", instructions:"Tortitas: Tritura gambas limpias, pasta de curry rojo, lima, ajo, cebollino, jengibre y soja. Forma 4 hamburguesas.\n\nCocción: Sartén con aceite, 4–5 min por lado hasta dorar.\n\nEnsalada de pepino: Rodajas de pepino, cebolla roja, lima, aceite de sésamo y sal. Decora con cilantro y cacahuetes.\n\nMontaje: Tortitas con arroz basmati integral y la ensalada."},
      {title:"Ramen Salad Bowls con Pollo a la Parrilla", instructions:"Marinado: Soja, jugo de naranja, aceite de sésamo, vinagre de arroz y miel. Marina el pollo 15 min y cocina en grill 5 min por lado. Corta en tiras.\n\nToque crujiente: Fideos ramen rotos y almendras fileteadas al horno a 175°C 6–10 min.\n\nMontaje: Base de col, pimiento y cebollino. Añade pollo y el mix crujiente justo antes de comer."},
    ],
  },
  3:{
    lunch:[
      {title:"Ensalada de Lentejas Puy con Vegetales Asados y Bacalao Marinado", instructions:"Vegetales (50%): Zanahorias e hinojo con aceite y sal. Asa a 200°C 30 min.\n\nLentejas Puy (35%): Hierve con laurel 15–20 min. Mezcla con los vegetales tibios.\n\nBacalao marinado (15%): Lomo en cubos en limón, aceite, ajo y sal. Marina 30 min.\n\nVinagreta: Aceite de oliva, vinagre de Jerez, mostaza Dijon y zumo de mandarina.\n\nMontaje: Base de lentejas y vegetales con vinagreta. Bacalao encima. Perejil fresco."},
      {title:"Puré de Guisantes Amarillos con Vegetales Asados y Salmón", instructions:"Puré (35%): Guisantes amarillos con cúrcuma y cebolla 60–90 min. Tritura con aceite y sal.\n\nVegetales (50%): Zanahorias e hinojo asados a 200°C 30 min.\n\nOpcional: Sofríe cebolla roja con alcaparras en mantequilla y vierte sobre el puré.\n\nMontaje: Puré en un lado, vegetales en la otra mitad. Corona con salmón ahumado (15%)."},
    ],
    dinner:[
      {title:"Ceviche de Gambas con Ensalada Mediterránea de Garbanzos", instructions:"Gambas (15%): Cuece en agua con ajo, cilantro y laurel hasta que estén opacas (3 min). Enfría en hielo y trocea.\n\nGarbanzos (35%): En conserva, bien enjuagados y escurridos.\n\nVegetales (50%): Pepino, tomates cherry, cebolla roja y aguacate en cubos.\n\nAliño: Lima, cilantro y sal. Refrigera 30 min antes de servir."},
      {title:"Larb de Ternera", instructions:"Cocción: Dora ternera picada en sartén a fuego alto 5–6 min rompiéndola en trozos.\n\nAromáticos: Añade chalota y cocina 2–3 min más.\n\nAderezo: Incorpora soja, zumo de lima y sambal oelek.\n\nHierbas frescas: Retira del fuego y mezcla cilantro, menta y cebolletas.\n\nServicio: Sobre arroz integral o en hojas de lechuga, con pepino y gajos de lima."},
    ],
  },
};

// ── State ──────────────────────────────────────────────────────────────────
let activeMeal = 'lunch';
let pendingDish = null;

// ── Storage ────────────────────────────────────────────────────────────────
function getWeekId() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((d - jan1) / 86400000);
  const startDay = jan1.getDay() || 7;
  const week = Math.ceil((dayOfYear + startDay) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

function getDietWeekNumber() {
  const key = 'dieta_start_week';
  let start = localStorage.getItem(key);
  if (!start) { start = getWeekId(); localStorage.setItem(key, start); }
  const [sy, sw] = start.split('-W').map(Number);
  const [ny, nw] = getWeekId().split('-W').map(Number);
  return (ny - sy) * 52 + (nw - sw) + 1;
}

function getLogged() {
  const saved = localStorage.getItem('dieta_' + getWeekId());
  if (saved) return JSON.parse(saved);
  return { lunch:{1:0,2:0,3:0}, dinner:{1:0,2:0,3:0} };
}

function saveLogged(data) {
  localStorage.setItem('dieta_' + getWeekId(), JSON.stringify(data));
}

// ── Meal context ───────────────────────────────────────────────────────────
function getMealContext() {
  const d = new Date();
  const h = d.getHours() + d.getMinutes() / 60;
  if (h >= 13 && h < 16) return 'lunch';
  if (h >= 20.5 && h < 23) return 'dinner';
  return 'fuera';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function getRemaining(meal, logged) {
  return [1,2,3].map(d => ({
    dish: d,
    remaining: LIMITS[meal][d] - (logged[meal][d] || 0),
    used: logged[meal][d] || 0,
  }));
}

function getSuggested(meal, logged) {
  const rem = getRemaining(meal, logged);
  const avail = rem.filter(r => r.remaining > 0);
  if (!avail.length) return rem[0];
  return avail.sort((a,b) => b.remaining - a.remaining)[0];
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Render header ──────────────────────────────────────────────────────────
function renderHeader() {
  const ctx = getMealContext();
  const weekNum = getDietWeekNumber();
  document.getElementById('hdr-semana').textContent = `Semana ${weekNum}`;

  if (ctx === 'fuera') {
    document.getElementById('header').style.display = 'none';
    return;
  }
  document.getElementById('header').style.display = 'block';
  document.getElementById('hdr-meal').textContent = ctx === 'lunch' ? '☀️ Comida' : '🌙 Cena';
  const status = document.getElementById('header-status');
  status.textContent = ctx === 'lunch' ? '● Comida activa' : '● Cena activa';
  status.style.color = '#4a7c59';
}

// ── Render Home ────────────────────────────────────────────────────────────
function renderHome() {
  const logged = getLogged();
  const meal = activeMeal;
  const suggested = getSuggested(meal, logged);
  const remaining = getRemaining(meal, logged);
  const dish = DISHES[suggested.dish];

  // Suggested card
  const card = document.getElementById('suggested-card');
  card.style.background = dish.bg;
  card.style.border = `1px solid ${dish.color}22`;
  const lbl = document.getElementById('sug-label');
  lbl.textContent = 'Sugerencia siguiente';
  lbl.style.color = dish.color;
  document.getElementById('sug-name').textContent = dish.name;
  document.getElementById('sug-comp').textContent = dish.comp;
  const badge = document.getElementById('sug-badge');
  badge.textContent = `${suggested.remaining} ${suggested.remaining === 1 ? 'restante' : 'restantes'} esta semana`;
  badge.style.cssText = `font-size:11px;padding:4px 10px;border-radius:20px;font-family:system-ui;background:#fff;color:${dish.color};border:1px solid ${dish.color}44;`;

  // Pills
  const pills = document.getElementById('pills');
  pills.innerHTML = '';
  remaining.forEach(({dish:d, remaining:rem}) => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.style.background = rem > 0 ? DISHES[d].bg : '#f5f5f5';
    btn.style.border = `1px solid ${rem > 0 ? DISHES[d].color+'33' : '#eee'}`;
    btn.innerHTML = `<div class="pill-num" style="color:${rem>0?DISHES[d].color:'#ccc'}">${rem}</div><div class="pill-lbl" style="color:${rem>0?DISHES[d].color:'#bbb'}">Ideas plato ${d}</div>`;
    btn.onclick = () => renderRecipes(d);
    pills.appendChild(btn);
  });

  // CTA
  document.getElementById('btn-log').textContent = meal === 'lunch' ? '¿Qué has comido?' : '¿Qué has cenado?';

  showView('view-home');
}

// ── Render Log ─────────────────────────────────────────────────────────────
function renderLog() {
  const logged = getLogged();
  const meal = activeMeal;
  const remaining = getRemaining(meal, logged);

  document.getElementById('log-main').style.display = 'block';
  document.getElementById('log-warn').style.display = 'none';
  document.getElementById('log-ok').style.display = 'none';
  document.getElementById('log-subtitle').textContent = meal === 'lunch' ? '¿Qué has comido?' : '¿Qué has cenado?';

  const container = document.getElementById('log-dishes');
  container.innerHTML = '';
  remaining.forEach(({dish:d, remaining:rem}) => {
    const dish = DISHES[d];
    const btn = document.createElement('button');
    btn.className = 'dish-btn';
    btn.style.cssText = `background:${rem>0?dish.bg:'#f5f5f5'};border:1px solid ${rem>0?dish.color+'33':'#eee'};margin-bottom:10px;`;
    btn.innerHTML = `
      <div>
        <div class="dish-name" style="color:${rem>0?'#2a2a2a':'#aaa'}">${dish.name}</div>
        <div class="dish-comp">${dish.comp}</div>
      </div>
      <div>
        <div class="dish-rem" style="color:${rem>0?dish.color:'#ccc'}">${rem}</div>
        <div class="dish-rem-lbl">restantes</div>
      </div>`;
    btn.onclick = () => logDish(d, rem);
    container.appendChild(btn);
  });

  showView('view-log');
}

function logDish(dishNum, rem) {
  if (rem <= 0) {
    pendingDish = dishNum;
    const meal = activeMeal;
    document.getElementById('warn-text').textContent = `Ya has usado todos los turnos de ${DISHES[dishNum].name} para ${meal==='lunch'?'la comida':'la cena'} esta semana. ¿Lo registras igualmente?`;
    document.getElementById('log-main').style.display = 'none';
    document.getElementById('log-warn').style.display = 'flex';
    document.getElementById('btn-override').onclick = () => confirmLog(dishNum);
  } else {
    confirmLog(dishNum);
  }
}

function confirmLog(dishNum) {
  const logged = getLogged();
  logged[activeMeal][dishNum] = (logged[activeMeal][dishNum] || 0) + 1;
  saveLogged(logged);
  pendingDish = null;
  document.getElementById('log-main').style.display = 'none';
  document.getElementById('log-warn').style.display = 'none';
  document.getElementById('log-ok').style.display = 'block';
  setTimeout(() => { renderHome(); }, 1600);
}

// ── Render Recipes ─────────────────────────────────────────────────────────
function renderRecipes(dishNum) {
  const dish = DISHES[dishNum];
  const recipes = RECIPES[dishNum]?.[activeMeal] || [];

  const card = document.getElementById('recipe-card');
  card.style.cssText = `background:${dish.bg};border:1px solid ${dish.color}22;border-radius:16px;padding:14px 16px;margin-bottom:0;`;
  card.innerHTML = `<div style="font-size:11px;color:${dish.color};letter-spacing:2px;text-transform:uppercase;font-family:system-ui;margin-bottom:4px;">${dish.name}</div><div style="font-family:system-ui;font-size:13px;color:#888;">${dish.comp}</div>`;

  const list = document.getElementById('recipes-list');
  list.innerHTML = '';
  recipes.forEach((r) => {
    const wrap = document.createElement('div');
    wrap.className = 'recipe-wrap';

    const btn = document.createElement('button');
    btn.className = 'recipe-btn';
    btn.style.cssText = 'background:#fff;color:#2a2a2a;border:1px solid #e0ddd8;border-radius:14px;';
    btn.innerHTML = `<span>${r.title}</span><span style="font-size:12px;opacity:0.5;">▼</span>`;

    const body = document.createElement('div');
    body.className = 'recipe-body';
    body.style.cssText = 'display:none;background:#f7f6f4;border:1px solid #2a2a2a;border-top:none;border-radius:0 0 14px 14px;';
    body.textContent = r.instructions;

    btn.onclick = () => {
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : 'block';
      btn.style.background = open ? '#fff' : '#2a2a2a';
      btn.style.color = open ? '#2a2a2a' : '#faf9f7';
      btn.style.border = open ? '1px solid #e0ddd8' : '1px solid #2a2a2a';
      btn.style.borderRadius = open ? '14px' : '14px 14px 0 0';
      btn.querySelector('span:last-child').textContent = open ? '▼' : '▲';
    };

    wrap.appendChild(btn);
    wrap.appendChild(body);
    list.appendChild(wrap);
  });

  showView('view-recipes');
}

// ── Render Weekly ──────────────────────────────────────────────────────────
function renderWeekly() {
  const logged = getLogged();
  const content = document.getElementById('weekly-content');
  content.innerHTML = '';
  ['lunch','dinner'].forEach(meal => {
    const sec = document.createElement('div');
    sec.className = 'week-section';
    sec.style.marginBottom = '14px';
    sec.innerHTML = `<div class="label" style="margin-bottom:10px;">${meal==='lunch'?'Comida':'Cena'}</div>`;
    [1,2,3].forEach(d => {
      const dish = DISHES[d];
      const used = logged[meal][d] || 0;
      const limit = LIMITS[meal][d];
      const pct = Math.min(used/limit*100, 100);
      const row = document.createElement('div');
      row.className = 'week-row';
      row.innerHTML = `
        <div class="week-row-hdr">
          <span style="font-family:'Georgia',serif;">${dish.name}</span>
          <span style="font-family:system-ui;font-size:12px;color:#aaa;">${used}/${limit}</span>
        </div>
        <div class="week-bar-bg"><div class="week-bar" style="width:${pct}%;background:${dish.color};"></div></div>`;
      sec.appendChild(row);
    });
    content.appendChild(sec);
  });
  showView('view-weekly');
}

// ── Event listeners ────────────────────────────────────────────────────────
document.getElementById('btn-log').onclick = renderLog;
document.getElementById('btn-log-cancel').onclick = renderHome;
document.getElementById('btn-warn-cancel').onclick = () => {
  document.getElementById('log-warn').style.display = 'none';
  document.getElementById('log-main').style.display = 'block';
  pendingDish = null;
};
document.getElementById('btn-recipe-back').onclick = renderHome;
document.getElementById('btn-weekly').onclick = renderWeekly;
document.getElementById('btn-weekly-back').onclick = renderHome;

// ── Boot ───────────────────────────────────────────────────────────────────
function boot() {
  const ctx = getMealContext();
  renderHeader();
  if (ctx === 'fuera') {
    const now = new Date();
    document.getElementById('fuera-hora').textContent = `Son las ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    showView('view-fuera');
    return;
  }
  activeMeal = ctx;
  renderHome();
}

boot();
</script>
</body>
</html>
